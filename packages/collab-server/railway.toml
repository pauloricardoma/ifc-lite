# Railway deployment for the IFC-Lite collaboration sync server.
# Mirrors apps/server's setup. Build context is the repo root.

[build]
builder = "dockerfile"
dockerfilePath = "packages/collab-server/Dockerfile"

[deploy]
# Each room holds authoritative in-memory CRDT state, so run a SINGLE replica.
# Scaling out requires room-affinity routing plus a shared blob store and a
# shared revocation deny-list (see the programmatic API).
numReplicas = 1
healthcheckPath = "/healthz"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Scale to zero when idle to eliminate 24/7 cost. GATED on a mounted volume:
# a slept instance restarts with a fresh ephemeral disk, so without a volume at
# COLLAB_DATA_DIR (/data) sleeping would wipe rooms + blobs on every wake. Attach
# the volume (Railway dashboard → Volumes → mount at /data), then flip this to
# true. The disk-backed FsBlobStorage already cuts the memory bill on its own.
sleepApplication = false
